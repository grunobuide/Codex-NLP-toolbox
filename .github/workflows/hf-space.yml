name: Sync to Hugging Face Space

# Mirrors the app to a HF Space on every push to main.
# Setup (one time):
#   1. Create a Streamlit Space on huggingface.co (e.g. <user>/codex-nlp-toolbox)
#   2. Repo Settings -> Secrets and variables -> Actions:
#      - secret   HF_TOKEN  = a HF access token with "write" scope
#      - variable HF_SPACE  = <user>/codex-nlp-toolbox

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ vars.HF_SPACE != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble Space repository
        run: |
          mkdir -p /tmp/space
          cp -r nlp_toolbox data evals docs app.py LICENSE /tmp/space/
          find /tmp/space -name "__pycache__" -type d -exec rm -rf {} + || true
          echo "streamlit>=1.32" > /tmp/space/requirements.txt
          cat > /tmp/space/README.md <<'READMEEOF'
          ---
          title: Codex NLP Toolbox
          emoji: 🔍
          colorFrom: purple
          colorTo: blue
          sdk: streamlit
          app_file: app.py
          pinned: false
          license: mit
          ---

          # Codex NLP Toolbox — live demo

          A reproducible, evaluation-driven NLP toolbox for **transparent
          linguistic baselines**. Every number traces back to a formula, a
          lexicon entry, or a counting rule — and the Benchmarks mode shows
          how these baselines score against langdetect, VADER and pysbd.

          Source, tests, CI and full documentation:
          https://github.com/grunobuide/Codex-NLP-toolbox
          READMEEOF
          sed -i 's/^          //' /tmp/space/README.md

      - name: Push to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          cd /tmp/space
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync from GitHub ${GITHUB_SHA::10}"
          HF_USER="${HF_SPACE%%/*}"
          git push --force "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" main
