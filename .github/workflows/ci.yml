name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Lint, type-check, test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies (locked)
        run: uv sync --group dev --locked
      - name: Lint
        run: uv run ruff check nlp_toolbox tests app.py
      - name: Format check
        run: uv run ruff format --check nlp_toolbox tests app.py
      - name: Type-check
        run: uv run mypy
      - name: Tests with coverage floor
        run: uv run pytest

  install-smoke:
    name: Clean install smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install wheel in clean venv and import
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "import nlp_toolbox.tools as t; print(t.detect_language('the quick brown fox'))"
