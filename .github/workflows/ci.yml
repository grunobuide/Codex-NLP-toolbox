name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Lint (ruff)
        run: uv run ruff check nlp_toolbox tests app.py evals
      - name: Format check (ruff)
        run: uv run ruff format --check nlp_toolbox tests app.py evals
      - name: Type check (mypy)
        run: uv run mypy
      - name: Tests with coverage
        run: uv run pytest

  install-smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        run: pipx run build --wheel
      - name: Install wheel in clean environment and import
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "
          from nlp_toolbox.languages import load_stopwords
          from nlp_toolbox.tools import readability_score, detect_language
          assert len(load_stopwords('Portuguese')) > 100
          print('smoke test ok')"
